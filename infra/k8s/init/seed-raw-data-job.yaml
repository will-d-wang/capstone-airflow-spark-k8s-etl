apiVersion: batch/v1
kind: Job
metadata:
  name: seed-raw-data
  namespace: ai-core-pipeline
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-01-16T16-06-34Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: pipeline-secrets, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: pipeline-secrets, key: MINIO_ROOT_PASSWORD } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mc alias set local http://minio.ai-core-pipeline.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb -p local/lake || true

              # Create two tenants for one date
              DATE="2026-03-06"
              cat > /tmp/events1.json <<'JSON1'
              {"tenant_id":"T1","event_id":"e1","event_ts":"2026-03-06T10:00:00Z","event_type":"click","payload":{"page":"home"}}
              {"tenant_id":"T1","event_id":"e1","event_ts":"2026-03-06T10:00:05Z","event_type":"click","payload":{"page":"home"}}
              {"tenant_id":"T1","event_id":"e2","event_ts":"2026-03-06T11:00:00Z","event_type":"view","payload":{"page":"pricing"}}
              JSON1

              cat > /tmp/events2.json <<'JSON2'
              {"tenant_id":"T2","event_id":"a1","event_ts":"2026-03-06T09:00:00Z","event_type":"click","payload":{"page":"docs"}}
              {"tenant_id":"T2","event_id":"a2","event_ts":"2026-03-06T09:10:00Z","event_type":"purchase","payload":{"sku":"s1"}}
              JSON2

              mc cp /tmp/events1.json local/lake/raw/dt=$DATE/tenant_id=T1/events-001.json
              mc cp /tmp/events2.json local/lake/raw/dt=$DATE/tenant_id=T2/events-001.json
